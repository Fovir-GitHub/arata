name: Mirror this repository to other git server

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest

    outputs:
      should_run: ${{ steps.decision.outputs.should_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Decide whether mirror should run
        id: decision
        shell: bash
        run: |
          set -eu

          should_run=true

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            should_run=true
          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            git fetch --force --tags origin

            tags_for_sha="$(git tag --points-at "${GITHUB_SHA}" || true)"

            if [ -n "${tags_for_sha}" ]; then
              echo "Current branch commit ${GITHUB_SHA} already has tag(s):"
              echo "${tags_for_sha}"
              echo "Skipping branch mirror run so the tag run owns this commit."
              should_run=false
            fi
          fi

          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"

  mirror:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror repository
        id: mirror
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_MIRROR }}
          REPO_URL_MIRROR: ${{ secrets.REPO_URL_MIRROR }}
        run: |
          set -eu

          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing SSH_PRIVATE_KEY_MIRROR secret."
            exit 1
          fi

          if [ -z "${REPO_URL_MIRROR}" ]; then
            echo "Missing REPO_URL_MIRROR secret."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          key_path="$HOME/.ssh/mirror_deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${key_path}"
          chmod 600 "${key_path}"

          export GIT_SSH_COMMAND="ssh -i ${key_path} -o StrictHostKeyChecking=accept-new"

          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

          git remote add mirror "${REPO_URL_MIRROR}"

          git fetch --force --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          git push --force --prune mirror "refs/remotes/origin/*:refs/heads/*"
          git push --force --prune mirror "refs/tags/*:refs/tags/*"
