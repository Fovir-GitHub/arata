<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" fill="none" aria-labelledby="title desc" class="theme--agnostic"><desc id="desc">Lighthouse scores: Performance 100, Accessibility 100, Best Practices 100, SEO 100.</desc><style>@keyframes load-gauge{0%{stroke-dasharray:0 351.858}}.gauge-title{stroke:none;font-family:Roboto,Helvetica,Arial,sans-serif;font-size:26px}.metric-label{font-family:&quot;Courier New&quot;,Courier,monospace;font-size:26px}.gauge-green{fill:#0cce6b;stroke:#0cce6b}.theme--agnostic .gauge-title,.theme--agnostic .metric-label{fill:#737373}</style><defs><symbol id="score-gauge" viewBox="0 0 200 200"><circle cx="100" cy="60" r="56" stroke-width="8" style="fill:none;opacity:.1"/><circle cx="100" cy="60" r="56" stroke-dasharray="351.858 351.858" stroke-width="8" style="fill:none;stroke-linecap:round;transform:rotate(-90deg);transform-origin:100px 60px;animation:load-gauge 1s ease forwards"/><text x="100" y="60" dominant-baseline="central" style="stroke:none;font-family:monospace;font-size:40px" text-anchor="middle">100</text></symbol></defs><g class="gauge-green" transform="translate(100)"><use width="200" height="200" href="#score-gauge"/><text x="100" y="160" class="gauge-title" dominant-baseline="central" text-anchor="middle">Performance</text></g><g class="gauge-green" transform="translate(300)"><use width="200" height="200" href="#score-gauge"/><text x="100" y="160" class="gauge-title" dominant-baseline="central" text-anchor="middle">Accessibility</text></g><g class="gauge-green" transform="translate(500)"><use width="200" height="200" href="#score-gauge"/><text x="100" y="160" class="gauge-title" dominant-baseline="central" text-anchor="middle">Best Practices</text></g><g class="gauge-green" transform="translate(700)"><use width="200" height="200" href="#score-gauge"/><text x="100" y="160" class="gauge-title" dominant-baseline="central" text-anchor="middle">SEO</text></g><g transform="translate(198 250)"><rect width="602" height="72" x="1" y="1" stroke-width="2" rx="36" ry="36" style="stroke:#616161"/><path stroke-linecap="round" stroke-width="14" d="M42 37h34" style="stroke:#ff4e42"/><path stroke-linecap="round" stroke-width="14" d="M227 37h34" style="stroke:#ffa400"/><path stroke-linecap="round" stroke-width="14" d="M417 37h34" style="stroke:#0cce6b"/><text x="100" y="45" class="metric-label">0-49</text><text x="280" y="45" class="metric-label">50-89</text><text x="470" y="45" class="metric-label">90-100</text></g></svg>